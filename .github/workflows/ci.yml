name: CI

on:
  push:
    branches: [ 'copilot/**' ]
    # branches: [ main, 'copilot/**' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Windows x64 - GitHub-hosted (MSVC + Ninja)
  windows:
    name: Windows MSVC Debug
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Jinja2 is installed
        run: python -m pip install --quiet jinja2

      - name: "Configure (preset: windows-msvc-debug)"
        run: cmake --preset windows-msvc-debug

      - name: "Build (preset: windows-debug)"
        run: cmake --build --preset windows-debug --parallel

  # Linux x64 - GitHub-hosted (GCC + Ninja)
  linux:
    name: Linux GCC Debug
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev libgl1-mesa-dev

      - name: Ensure Jinja2 is installed
        run: python3 -m pip install --quiet jinja2

      - name: "Configure (preset: linux-gcc-debug)"
        run: cmake --preset linux-gcc-debug

      - name: "Build (preset: linux-debug)"
        run: cmake --build --preset linux-debug --parallel
