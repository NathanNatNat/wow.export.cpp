name: CI

on:
  push:
    branches: [ main, 'copilot/**' ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Windows x64 — GitHub-hosted (MSVC + Ninja)
  # sccache uses a filesystem cache persisted via actions/cache because the
  # GHA cache backend produces different MSVC input hashes each run (MSVC
  # preprocessing non-determinism), causing 0% hit rates and unbounded cache
  # entry growth when SCCACHE_GHA_ENABLED is used.
  windows:
    name: Windows MSVC Debug
    runs-on: windows-latest

    env:
      SCCACHE_DIR: D:\a\sccache

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Jinja2 is installed
        run: pip install --quiet jinja2

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: D:\a\sccache
          key: sccache-msvc-debug-${{ hashFiles('src/**', 'CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            sccache-msvc-debug-

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Configure (preset: windows-msvc-debug)"
        run: cmake --preset windows-msvc-debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_FLAGS_DEBUG="/Z7 /Od /RTC1" -DCMAKE_CXX_FLAGS_DEBUG="/Z7 /Od /RTC1"

      - name: "Build (preset: windows-debug)"
        run: cmake --build --preset windows-debug --parallel

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  # Linux x64 — GitHub-hosted (GCC + Ninja)
  # sccache uses the GHA cache API directly (SCCACHE_GHA_ENABLED) for
  # fine-grained per-translation-unit caching; this works correctly on Linux.
  linux:
    name: Linux GCC Debug
    runs-on: ubuntu-latest

    env:
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libssl-dev

      - name: Ensure Jinja2 is installed
        run: pip install --quiet jinja2

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Configure (preset: linux-gcc-debug)"
        run: cmake --preset linux-gcc-debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: "Build (preset: linux-debug)"
        run: cmake --build --preset linux-debug --parallel

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats
