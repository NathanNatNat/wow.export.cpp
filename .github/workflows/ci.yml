name: CI

on:
  push:
    branches: [ 'copilot/**' ]
    # branches: [ main, 'copilot/**' ]
  workflow_dispatch:

permissions:
  contents: read

env:
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # Windows x64 — GitHub-hosted (MSVC + Ninja)
  windows:
    name: Windows MSVC Debug
    runs-on: windows-latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip

      - name: Set up MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Ensure Jinja2 is installed
        run: pip install --quiet jinja2

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: "Configure (preset: windows-msvc-debug)"
        run: cmake --preset windows-msvc-debug -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_C_FLAGS_DEBUG="/Z7 /Od /RTC1" -DCMAKE_CXX_FLAGS_DEBUG="/Z7 /Od /RTC1"

      - name: "Build (preset: windows-debug)"
        run: cmake --build --preset windows-debug --parallel

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

